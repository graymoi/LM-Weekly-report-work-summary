## 最佳实践

### 1. 合理选择

- 不盲目追求高级模型
- 根据实际需求选择
- 平衡性能与成本

### 2. 监控效果

- 记录模型使用情况
- 分析任务成功率
- 优化路由规则

### 3. 降级策略

- 模型不可用时自动降级
- 设置超时机制
- 保留用户选择权

