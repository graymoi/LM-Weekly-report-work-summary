# 模型路由配置

## 概述

根据任务类型和复杂度，自动选择最合适的模型进行处理。

---

## 路由策略

### 1. 任务类型路由

| 任务类型 | 推荐模型 | 原因 |
|---------|---------|------|
| 简单问答 | 快速模型 | 响应快、成本低 |
| 复杂分析 | 高级模型 | 推理能力强 |
| 创意生成 | 创意模型 | 发散思维 |
| 代码开发 | 代码模型 | 专业能力 |

### 2. 复杂度路由

| 复杂度 | 判断标准 | 推荐模型 |
|-------|---------|---------|
| 低 | 单步任务、明确答案 | 快速模型 |
| 中 | 多步任务、需要推理 | 标准模型 |
| 高 | 复杂推理、多领域 | 高级模型 |

### 3. 上下文长度路由

| 上下文长度 | 推荐模型 | 说明 |
|-----------|---------|------|
| < 4K | 标准模型 | 够用即可 |
| 4K - 32K | 长上下文模型 | 需要更多上下文 |
| > 32K | 超长上下文模型 | 处理大量文档 |

---

## 路由规则

```yaml
model_routing:
  enabled: true
  default_model: "standard"

  rules:
    - name: "简单问答"
      conditions:
        - task_type: "question"
        - complexity: "low"
      model: "fast"

    - name: "复杂分析"
      conditions:
        - task_type: "analysis"
        - complexity: "high"
      model: "advanced"

    - name: "代码开发"
      conditions:
        - task_type: "code"
      model: "code"

    - name: "创意生成"
      conditions:
        - task_type: "creative"
      model: "creative"

    - name: "长文档处理"
      conditions:
        - context_length: "> 32K"
      model: "long_context"
```

---

## 模型配置

### 当前可用模型（TRAE平台）

| 模型类型 | 模型名称 | 特点 |
|---------|---------|------|
| 默认 | GLM-4 | 平衡性能 |
| 快速 | GLM-3-Turbo | 快速响应 |
| 高级 | GLM-4-Plus | 高级推理 |

### 模型能力矩阵

| 能力 | GLM-4 | GLM-3-Turbo | GLM-4-Plus |
|------|-------|-------------|------------|
| 响应速度 | ⭐⭐⭐ | ⭐⭐⭐⭐⭐ | ⭐⭐ |
| 推理能力 | ⭐⭐⭐⭐ | ⭐⭐⭐ | ⭐⭐⭐⭐⭐ |
| 创意能力 | ⭐⭐⭐⭐ | ⭐⭐⭐ | ⭐⭐⭐⭐⭐ |
| 代码能力 | ⭐⭐⭐⭐ | ⭐⭐⭐ | ⭐⭐⭐⭐⭐ |
| 成本 | ⭐⭐⭐ | ⭐⭐⭐⭐⭐ | ⭐⭐ |

---

## 路由流程

```
任务输入
    │
    ├── 分析任务类型
    │       ├── 问答 / 分析 / 创作 / 代码
    │       └── 确定类型标签
    │
    ├── 评估复杂度
    │       ├── 步骤数
    │       ├── 领域数
    │       └── 推理深度
    │
    ├── 检查上下文长度
    │       └── 计算Token数
    │
    ├── 匹配路由规则
    │       ├── 按优先级匹配
    │       └── 选择最佳模型
    │
    └── 执行任务
            ├── 调用选定模型
            └── 返回结果
```

---

## 配置文件

在 `hook-config.yaml` 中配置：

```yaml
model_routing:
  enabled: true
  default_model: "glm-4"

  fallback:
    enabled: true
    model: "glm-4"
    conditions:
      - "model_unavailable"
      - "timeout"

  cache:
    enabled: true
    ttl: 3600

  logging:
    enabled: true
    log_routing: true
```

